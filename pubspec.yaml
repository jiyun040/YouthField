name: youthfield
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  material_symbols_icons: ^4.2782.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: LINESeedKR
      fonts:
        - asset: assets/font/LINESeedKR-Bd.ttf
          weight: 700
        - asset: assets/font/LINESeedKR-Rg.ttf
          weight: 400

  assets:
    - assets/
    - assets/svg/